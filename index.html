<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: white;
            padding-top: 50px;
        }

        #box {
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            border: none;
            background: #4a6cf7;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="box">
        <h1>Buyanjargal Lkhagvajamts</h1>
        <p>Incoming Freshman</p>

        <h3>Skills</h3>
        <p>Speedcubing, Cross Country, Volleyball</p>

        <button onclick="hello()">Click Me</button>
        <p id="text"></p>
    </div>

    <script>
        function hello() {
            document.getElementById("text").innerHTML =
                "Thanks for visiting my website!";
        }
    </script>
</body>
</html>
